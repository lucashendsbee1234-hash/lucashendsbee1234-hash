<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 { color: #333; text-align: center; }
        .input-group { display: flex; gap: 10px; margin-bottom: 1rem; }
        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        ul { list-style: none; padding: 0; }
        li {
            background: #fff;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eee;
        }
        .delete-btn { background: #ff4757; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Task Master</h1>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="What's the plan?">
        <button onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script>
    function addTask() {
        const input = document.getElementById('taskInput');
        const list = document.getElementById('taskList');
        if (input.value.trim() === '') return;

        const li = document.createElement('li');
        li.innerHTML = `
            <span>${input.value}</span>
            <button class="delete-btn" onclick="this.parentElement.remove()">Done</button>
        `;
        list.appendChild(li);
        input.value = '';
    }
</script>

</body>
</html>
